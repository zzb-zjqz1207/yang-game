<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羊羊消消乐</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>🐑 羊羊消消乐</h1>
            <div class="score-board">
                <span>关卡：<span id="level">1</span></span>
                <span>得分：<span id="score">0</span></span>
            </div>
        </header>

        <div class="card-pool" id="cardPool">
            <!-- 卡片堆叠区域 -->
        </div>

        <div class="slot-container">
            <div class="slot" id="slot">
                <!-- 槽位区域，最多 7 张卡片 -->
            </div>
        </div>

        <div class="tools">
            <button class="tool-btn" id="undoBtn" onclick="game.undo()">
                ↩️ 撤销
                <span class="count" id="undoCount">3</span>
            </button>
            <button class="tool-btn" id="shuffleBtn" onclick="game.shuffle()">
                🔄 洗牌
                <span class="count" id="shuffleCount">3</span>
            </button>
            <button class="tool-btn" id="removeBtn" onclick="game.removeThree()">
                ❌ 移除
                <span class="count" id="removeCount">3</span>
            </button>
        </div>

        <div class="controls">
            <button class="action-btn" onclick="game.restart()">🔄 重新开始</button>
        </div>

        <!-- 游戏结束弹窗 -->
        <div class="modal" id="modal">
            <div class="modal-content">
                <h2 id="modalTitle">游戏结束</h2>
                <p id="modalMessage"></p>
                <button class="action-btn" onclick="game.restart()">再来一局</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
